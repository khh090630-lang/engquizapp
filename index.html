<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>영어 지문 변형문제 생성기</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
</head>
<body>
    <div class="container">
        <h1>📝 영어 지문 변형문제 생성기</h1>
        <div class="section">
            <input type="password" id="api-key" placeholder="Gemini API Key 입력">
            <button onclick="saveApiKey()">키 저장</button>
            <span id="key-status"></span>
        </div>
        <div class="section">
            <h3>1. 새 지문 입력</h3>
            <input type="text" id="passage-title" placeholder="지문 이름 (예: 24년 6월 모의고사 31번)">
            <textarea id="new-passage" placeholder="영어 지문을 입력하세요..."></textarea>
            <button onclick="savePassageToDB()">DB에 저장</button>
            <span id="save-status"></span>
        </div>
        <div class="section">
            <h3>2. 문제화할 지문 선택</h3>
            <button onclick="loadPassages()">지문 불러오기</button>
            <div id="passage-list"></div>
        </div>
        <div class="section">
            <h3>3. 문제 유형 설정</h3>
            <select id="question-type">
                <option value="빈칸 추론">빈칸 추론 (핵심어/구)</option>
                <option value="순서 배열">순서 배열</option>
                <option value="문장 삽입">문장 삽입</option>
                <option value="어법 및 어휘">어법/어휘 오류 찾기</option>
            </select>
            <input type="number" id="question-count" min="1" max="5" value="1" style="width: 50px;"> 문항
            <button onclick="generateExam()" class="primary-btn">문제 생성</button>
        </div>
        <div class="section result-section">
            <h3>4. 생성된 시험지 <button onclick="downloadPDF()" class="pdf-btn">PDF 다운로드</button></h3>
            <div id="exam-paper">
                <p id="loading-msg" style="display:none; color:blue;">문제를 출제 중입니다...</p>
                <div id="output-content">결과 대기 중</div>
            </div>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
